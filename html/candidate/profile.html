<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | Eliquence</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="../../css/global.css?v=5.0.9">
    <link rel="stylesheet" href="../../css/profile.css?v=5.0.9">
    <link rel="stylesheet" href="../../css/service/notification-system.css?v=5.0.9">
    <link rel="stylesheet" href="../../css/service/icon-action.css?v=5.0.9">
    <link rel="stylesheet" href="../../css/about-me/layout/header.css?v=5.0.9">
</head>

<body>
    <header class="app-header">
        <div class="header-content">

            <button class="back-button size-40">
                <img src="../../images/icons/arrow-back.svg" alt="Назад">
            </button>

            <h1 class="app-title">Профиль</h1>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="profile-hero">
        <div class="hero-content">
            <div class="avatar-container" id="userAvatar"></div>

            <h1 class="user-name" id="userName"></h1>

            <div class="user-position" id="userPosition"></div>

            <div class="status-tag" id="statusTag">
                <span class="status-dot" id="statusDot"></span>
                <span id="userStatus">Активный поиск</span>
            </div>
        </div>
    </section>

    <div class="container">

        <!-- Quick Stats -->
        <div class="quick-stats">
            <div class="stat-item">
                <div class="stat-value" id="statApplications"></div>
                <div class="stat-label">Отклики</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statInvitations"></div>
                <div class="stat-label">Приглашения</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statRejections"></div>
                <div class="stat-label">Отказы</div>
            </div>
        </div>

        <div class="actions-grid">
            <div class="action-card" data-action="about-me">
                <img src="../../images/icons/about-me.svg" alt="Обо мне" class="action-icon">
                <div class="action-label">Обо мне</div>
                <div class="action-description">Основная информация</div>
            </div>

            <div class="action-card" data-action="resume">
                <img src="../../images/icons/cv.svg" alt="Резюме" class="action-icon">
                <div class="action-label">Резюме</div>
                <div class="action-description">Опыт и навыки</div>
            </div>

            <div class="action-card" data-action="vacancies">
                <img src="../../images/icons/vacancy.svg" alt="Вакансии" class="action-icon">
                <div class="action-label">Вакансии</div>
                <div class="action-description">Предложения о работе</div>
            </div>
        </div>
    </div>

    <script src="../../js/util/Helpers.js?v=5.0.9"></script>
    <script src="../../js/util/UserProfileFiller.js?v=5.0.9"></script>
    <script src="../../js/service/NotificationService.js?v=5.0.9"></script>
    <script src="../../js/service/NavigationService.js?v=5.0.9"></script>
    <script src="../../js/service/ApiService.js?v=5.0.9"></script>
    <script src="../../js/service/ProfileService.js?v=5.0.9"></script>
    <script src="../../js/component/ExperienceComponent.js?v=5.0.9"></script>
    <script src="../../js/component/SkillsComponent.js?v=5.0.9"></script>
    <script src="../../js/manager/CandidateProfileManager.js?v=5.0.9"></script>
    <script src="../../js/manager/BaseProfile.js?v=5.0.9"></script>
</body>
</html>
