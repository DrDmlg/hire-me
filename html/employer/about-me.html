<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обо мне | Eliquence</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

    <link rel="stylesheet" href="../../css/global.css?v=5.0.0">
    <link rel="stylesheet" href="../../css/about-me/about-me.css?v=5.0.0">
    <link rel="stylesheet" href="../../css/about-me/component/personal-information.css?v=5.0.0">
    <link rel="stylesheet" href="../../css/about-me/component/experience.css?v=5.0.0">
    <link rel="stylesheet" href="../../css/about-me/component/contacts.css?v=5.0.0">
    <link rel="stylesheet" href="../../css/about-me/component/basic-info.css?v=5.0.0">
    <link rel="stylesheet" href="../../css/service/notification-system.css?v=5.0.0">
    <link rel="stylesheet" href="../../css/service/icon-action.css?v=5.0.0">
    <link rel="stylesheet" href="../../css/about-me/layout/header.css?v=5.0.0">
    <link rel="stylesheet" href="../../css/about-me/layout/empty-state.css?v=5.0.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
</head>

<body>
<header class="app-header">
    <div class="header-content">
        <button class="back-button size-40">
            <img src="../../images/icons/arrow-back.svg" alt="Назад">
        </button>

        <h1 class="app-title">Обо мне</h1>
    </div>
</header>

<!-- Hero Section -->
<section class="profile-hero">
    <div class="hero-content">

        <div class="avatar-container" id="userAvatar">
            <div class="avatar-overlay">
                <img src="../../images/icons/camera.svg" alt="Сменить фото" class="camera-icon">
            </div>
            <input type="file" id="avatarInput" accept="image/*" style="display: none;">
        </div>

        <div class="name-wrapper">
            <h1 class="user-name" id="userName"></h1>
            <button class="button-icon size-24" id="editUserNameBtn">
                <img src="../../images/icons/edit-avatar.svg" alt="Править">
            </button>
        </div>

        <div class="user-position" id="userPosition"></div>
    </div>
</section>

<div class="container">

    <!-- Progress Section -->
    <div class="completion-section">
        <div class="completion-header">
            <span class="completion-label">Заполнение профиля</span>
            <span class="completion-percent"></span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <div class="content-section">

        <!--Headline Description-->
        <div class="headline-description" id="headlineContainer">
            <div id="headlineDisplay" class="headline-text"></div>
        </div>

        <div class="basic-info-section">
            <div class="section-header">
                <div class="section-title">Детали работодателя</div>
                <button class="button-icon size-32"
                        id="editEmployerBtn"
                        title="Редактировать">
                    <img src="../../images/icons/edit.svg" alt="Редактировать">
                </button>
            </div>

            <div class="basic-info-form" id="employerForm" style="display: none;">
                <div class="form-title">Данные компании</div>
                <form id="employerFormElement">
                    <div class="form-group">
                        <label>Агентство</label>
                        <input type="text"
                               class="form-input"
                               id="editCompanyNameInput"
                               maxlength="100"
                               placeholder="Capital Group">
                    </div>

                    <div class="form-group">
                        <label>Локация</label>
                        <input type="text"
                               class="form-input"
                               id="editEmployerLocationInput"
                               maxlength="200"
                               placeholder="Москва, Пресненский район">
                    </div>

                    <div class="form-group">
                        <label>Должность</label>
                        <input type="text"
                               class="form-input"
                               id="editEmployerPositionInput"
                               maxlength="100"
                               placeholder="HR-директор">
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelEmployerBtn">Отмена</button>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>

            <div class="info-grid-compact" id="employerInfoList">
                <div class="info-row">
                    <span class="info-label-compact">Агентство</span>
                    <span class="info-value-compact" id="companyNameValue">Не указано</span>
                </div>
                <div class="info-row">
                    <span class="info-label-compact">Локация</span>
                    <span class="info-value-compact" id="employerLocationValue">Не указано</span>
                </div>
                <div class="info-row">
                    <span class="info-label-compact">Должность</span>
                    <span class="info-value-compact" id="employerPositionValue">Не указано</span>
                </div>
            </div>
        </div>

        <!-- Contacts Section -->
        <div class="contacts-section">
            <div class="section-header">
                <div class="section-title">Контакты</div>
                <button class="button-icon size-32"
                        id="addContactBtn"
                        title="Редактировать контакты">
                    <img src="../../images/icons/edit.svg" alt="Редактировать">
                </button>
            </div>

            <!-- Форма редактирования -->
            <div class="contacts-form" id="contactsForm" style="display: none;">
                <div class="form-title">Редактировать контакты</div>
                <form id="contactsFormElement">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email"
                               class="form-input"
                               id="contactEmail"
                               maxlength="254"
                               placeholder="example@mail.com">
                    </div>

                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="tel"
                               class="form-input"
                               id="contactPhone"
                               maxlength="20"
                               placeholder="+7 (999) 123-45-67">
                    </div>

                    <div class="form-group">
                        <label>Telegram</label>
                        <div class="input-with-prefix">
                            <span class="input-prefix">@</span>
                            <input type="text"
                                   class="form-input"
                                   id="contactTelegram"
                                   maxlength="32"
                                   placeholder="username">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="tel"
                               class="form-input"
                               id="contactWhatsApp"
                               maxlength="20"
                               placeholder="+7 (999) 123-45-67">
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelContactBtn">Отмена</button>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>

            <!-- Список контактов -->
            <div class="contacts-list" id="contactsList">
                <!-- Динамически заполнится через JavaScript -->
            </div>
        </div>

        <!-- Experience Section -->
        <div class="experience-section">
            <div class="section-header">
                <div class="section-title">Опыт работы</div>
                <button class="button-icon size-32"
                        id="addExperienceBtn">
                    <img src="../../images/icons/add.svg" alt="Добавить">
                </button>
            </div>

            <!-- Форма добавления/редактирования -->
            <div class="experience-form" id="experienceForm" style="display: none;">
                <div class="form-title" id="formTitle">Добавить опыт работы</div>
                <form id="experienceFormElement">
                    <div class="form-group">
                        <label>Компания</label>
                        <input type="text" class="form-input" id="companyName" required
                               placeholder="Penny Lane Realty, METRIUM, ЦИАН">
                    </div>
                    <div class="form-group">
                        <label>Должность</label>
                        <input type="text" class="form-input" id="position" required
                               placeholder="HR-менеджер, Специалист по подбору">
                    </div>
                    <div class="form-group">
                        <label>Начало работы</label>
                        <div class="period-inputs">
                            <select class="form-input" id="startMonth" required>
                                <option value="" disabled selected>Месяц</option>
                                <option value="0">Январь</option>
                                <option value="1">Февраль</option>
                                <option value="2">Март</option>
                                <option value="3">Апрель</option>
                                <option value="4">Май</option>
                                <option value="5">Июнь</option>
                                <option value="6">Июль</option>
                                <option value="7">Август</option>
                                <option value="8">Сентябрь</option>
                                <option value="9">Октябрь</option>
                                <option value="10">Ноябрь</option>
                                <option value="11">Декабрь</option>
                            </select>
                            <input type="number" class="form-input" id="startYear" placeholder="Год" min="1950"
                                   max="2026" required>
                        </div>
                    </div>

                    <div class="form-group" id="endDateGroup">
                        <label>Окончание</label>
                        <div class="period-inputs">
                            <select class="form-input" id="endMonth">
                                <option value="" disabled selected>Месяц</option>
                                <option value="0">Январь</option>
                                <option value="1">Февраль</option>
                                <option value="2">Март</option>
                                <option value="3">Апрель</option>
                                <option value="4">Май</option>
                                <option value="5">Июнь</option>
                                <option value="6">Июль</option>
                                <option value="7">Август</option>
                                <option value="8">Сентябрь</option>
                                <option value="9">Октябрь</option>
                                <option value="10">Ноябрь</option>
                                <option value="11">Декабрь</option>
                            </select>
                            <input type="number" class="form-input" id="endYear" placeholder="Год" min="1950"
                                   max="2026">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Описание обязанностей и достижений</label>
                        <textarea class="form-input form-textarea"
                                  id="workDescription"
                                  maxlength="1000"
                                  placeholder="Полный цикл подбора: риелторы (элитная/коммерческая недвижимость), менеджеры по продажам новостроек, руководители отделов"></textarea>
                        <div class="char-counter"><span id="charCount">0</span>/1000</div>
                    </div>
                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="currentJob">
                            <label for="currentJob">Это моё текущее место работы</label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
                        <button type="submit" class="btn btn-primary" id="saveButton">Сохранить</button>
                        <button type="submit" class="btn btn-primary" id="updateButton" style="display: none;">
                            Обновить
                        </button>
                    </div>
                </form>
            </div>

            <!-- Список опыта работы -->
            <div class="experience-list" id="experienceList">
                <!-- Будет заполняться динамически через JavaScript -->
            </div>
        </div>
    </div>
</div>

<div id="cropperOverlay" class="cropper-overlay" style="display: none;">
    <div class="cropper-container-inner">
        <div class="cropper-header">
            <button type="button" class="cropper-cancel" id="closeCropper">Отмена</button>
            <span class="cropper-title">Фото профиля</span>
            <button type="button" class="cropper-confirm" id="saveCroppedImage">Готово</button>
        </div>
        <div class="cropper-body">
            <img id="imageToCrop" src="" alt="Обрезать фото">
        </div>
        <div class="cropper-footer">
            <p>Перетащите и масштабируйте</p>
        </div>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay"></div>

<div id="nameModal" class="bottom-sheet">
    <div class="sheet-header">
        <div class="sheet-indicator"></div>
        <h2 class="sheet-title">Личные данные</h2>
    </div>

    <div class="sheet-body">
        <div class="form-group">
            <label>Имя</label>
            <input type="text"
                   id="modalFirstName"
                   class="form-input"
                   maxlength="64">
        </div>

        <div class="form-group">
            <label>Фамилия</label>
            <input type="text"
                   id="modalLastName"
                   class="form-input"
                   maxlength="64">
        </div>
        <div class="sheet-actions">
            <button type="button" class="btn btn-secondary" id="closeNameModal">Отмена</button>
            <button type="button" class="btn btn-primary" id="saveNameModal">Сохранить</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="headlineOverlay"></div>
<div id="headlineModal" class="bottom-sheet">
    <div class="sheet-indicator"></div>
    <h2 class="sheet-title">О себе</h2>

    <div class="form-group">
        <textarea id="headlineInput"
                  class="form-textarea"
                  maxlength="200"
                  placeholder="Короткий заголовок о себе и достижениях"></textarea>
        <div class="char-counter">
            <span id="headlineCharCount">0</span>/200
        </div>
    </div>

    <div class="sheet-actions">
        <button type="button" class="btn btn-secondary" id="cancelHeadlineBtn">Отмена</button>
        <button type="button" class="btn btn-primary" id="saveHeadlineBtn">Сохранить</button>
    </div>
</div>

<script src="../../js/util/Helpers.js?v=5.0.0"></script>
<script src="../../js/util/UserProfileFiller.js?v=5.0.0"></script>
<script src="../../js/service/ApiService.js?v=5.0.0"></script>
<script src="../../js/service/ProfileService.js?v=5.0.0"></script>
<script src="../../js/service/NotificationService.js?v=5.0.0"></script>
<script src="../../js/service/NavigationService.js?v=5.0.0"></script>
<script src="../../js/component/PersonalInformationComponent.js?v=5.0.0"></script>
<script src="../../js/component/HeadlineComponent.js?v=5.0.0"></script>
<script src="../../js/component/AvatarComponent.js?v=5.0.0"></script>
<script src="../../js/component/ExperienceComponent.js?v=5.0.0"></script>
<script src="../../js/component/ContactsComponent.js?v=5.0.0"></script>
<script src="../../js/component/BaseInfoComponent.js?v=5.0.0"></script>
<script src="../../js/component/EmployerDetailComponent.js?v=5.0.0"></script>
<script src="../../js/manager/AboutMeManager.js?v=5.0.0"></script>
</body>
</html>
