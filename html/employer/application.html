<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отклики | Eliquence</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="../../css/global.css?v=5.0.4">
    <link rel="stylesheet" href="../../css/profile.css?v=5.0.4">
    <link rel="stylesheet" href="../../css/application.css?v=5.0.4">
    <link rel="stylesheet" href="../../css/service/notification-system.css?v=5.0.4">
    <link rel="stylesheet" href="../../css/service/icon-action.css?v=5.0.4">
    <link rel="stylesheet" href="../../css/about-me/layout/header.css?v=5.0.4">
    <link rel="stylesheet" href="../../css/about-me/layout/header.css?v=5.0.4">
</head>

<body>
<header class="app-header">
    <div class="header-content">
        <button class="back-button size-40">
            <img src="../../images/icons/arrow-back.svg" alt="Назад">
        </button>
        <h1 class="app-title">Отклики</h1>
    </div>
</header>

<div class="container">
    <!-- Filters -->
    <div class="responses-filters">
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">
                <span class="filter-name">Все</span>
                <span class="filter-count" id="countAll">0</span>
            </button>
        </div>
    </div>

    <!-- Responses Container -->
    <main class="responses-container">
        <!-- Группировка по вакансиям -->
        <div class="responses-grouped" id="responsesGrouped">
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-title">Пока нет новых откликов</div>
            <div class="empty-description">Как только кандидаты начнут откликаться на ваши вакансии, они появятся
                здесь
            </div>
        </div>
    </main>
</div>

<script src="../../js/util/Helpers.js"></script>
<script src="../../js/util/UserProfileFiller.js"></script>
<script src="../../js/service/ApiService.js"></script>
<script src="../../js/service/ProfileService.js"></script>
<script src="../../js/service/NotificationService.js"></script>
<script src="../../js/service/NavigationService.js"></script>
<script src="../../js/component/ApplicationComponent.js"></script>
<script src="../../js/manager/ApplicationManager.js"></script>
</body>
</html>
