<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание вакансии | Eliquence</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="../../css/global.css?v=5.0.4">
    <link rel="stylesheet" href="../../css/publication.css?v=5.0.4">
    <link rel="stylesheet" href="../../css/service/notification-system.css?v=5.0.4">
    <link rel="stylesheet" href="../../css/service/icon-action.css?v=5.0.4">
    <link rel="stylesheet" href="../../css/about-me/layout/header.css?v=5.0.4">
</head>

<body>
<header class="app-header">
    <div class="header-content">
        <button class="back-button size-40">
            <img src="../../images/icons/arrow-back.svg" alt="Назад">
        </button>

        <h1 class="app-title">Публикация</h1>
    </div>
</header>

<div class="container vacancy-publish">
    <div class="progress-steps">
        <div class="step-indicator active" data-step="1"></div>
        <div class="step-indicator" data-step="2"></div>
        <div class="step-indicator" data-step="3"></div>
        <div class="step-indicator" data-step="4"></div>
        <div class="step-indicator" data-step="5"></div>
        <div class="step-indicator" data-step="6"></div>
        <div class="step-indicator" data-step="7"></div>
    </div>

    <!-- Шаг 1: Основная информация -->
    <form id="vacancyForm" class="vacancy-form step active" data-step="1">

        <div class="form-group">
            <label for="title">Должность</label>
            <input type="text"
                   id="title"
                   name="title"
                   class="form-input"
                   placeholder="Менеджер в департамент недвижимости">
        </div>

        <div class="form-group">
            <label for="companyName">Название компании</label>
            <input type="text"
                   id="companyName"
                   name="companyName"
                   class="form-input"
                   placeholder="Knight Frank">
        </div>

        <div class="form-row">
            <div class="form-group half">
                <label for="workFormat">Формат работы</label>
                <select id="workFormat"
                        name="workFormat"
                        class="form-select">
                    <option value="REMOTE">Удаленно</option>
                    <option value="OFFICE">Офис</option>
                    <option value="HYBRID">Гибрид</option>
                </select>
            </div>

            <div class="form-group half">
                <label for="workSchedule">График работы</label>
                <select id="workSchedule"
                        name="workSchedule"
                        class="form-select">
                    <option value="FULL_TIME">5/2 (полный день)</option>
                    <option value="FLEXIBLE">Гибкий график</option>
                    <option value="PART_TIME">Частичная занятость</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="address">Адрес</label>
            <input type="text"
                   id="address"
                   name="address"
                   class="form-input"
                   placeholder="Москва, ул. Тверская, 10">
        </div>

        <div class="step-actions">

            <button type="button" class="step-button" id="nextStep1" title="Вперед">
                <img src="../../images/icons/arrow-right.svg" alt="Вперед">
            </button>
        </div>
    </form>

    <!-- Шаг 2: Зарплата и опыт -->
    <form class="vacancy-form step" data-step="2">

        <div class="form-group">
            <label for="salaryMin">Зарплата от</label>
            <div class="salary-container">
                <div class="salary-input">
                    <input type="text"
                           id="salaryMin"
                           name="salaryMin"
                           class="form-input"
                           placeholder="450 000"
                           inputmode="numeric" pattern="[0-9 ]*" required>
                </div>

                <div class="currency-select-wrapper">
                    <select id="currencyFrom" name="currency" class="currency-select">
                        <option value="RUB">₽ / мес.</option>
                        <option value="USD">$ / мес.</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="salaryMax">Зарплата до</label>
            <div class="salary-container">
                <div class="salary-input">
                    <input type="text"
                           id="salaryMax"
                           name="salaryMax"
                           class="form-input"
                           placeholder="750 000"
                           inputmode="numeric" pattern="[0-9 ]*" required>
                </div>

                <div class="currency-select-wrapper">
                    <select id="currencyTo" name="currency" class="currency-select">
                        <option value="RUB">₽ / мес.</option>
                        <option value="USD">$ / мес.</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="experience">Требуемый опыт</label>
            <select id="experience"
                    name="experience"
                    class="form-select">
                <option value="ANY">Не имеет значения</option>
                <option value="NO_EXPERIENCE">Без опыта</option>
                <option value="ONE_TO_THREE">1-3 года</option>
                <option value="THREE_TO_SIX">3-6 лет</option>
                <option value="MORE_THAN_SIX">Более 6 лет</option>
            </select>
        </div>

        <div class="step-actions">
            <button type="button" class="step-button" id="prevStep2" title="Назад">
                <img src="../../images/icons/arrow-left.svg" alt="Назад">
            </button>

            <button type="button" class="step-button" id="nextStep2" title="Вперед">
                <img src="../../images/icons/arrow-right.svg" alt="Вперед">
            </button>
        </div>
    </form>

    <!-- Шаг 3: Обязанности -->
    <form class="vacancy-form step" data-step="3">

        <div class="form-group">
            <label for="responsibilities">Обязанности</label>
            <textarea id="responsibilities"
                      name="responsibilities"
                      class="form-textarea"
                      maxlength="2000"
                      rows="4"
                      placeholder=""></textarea>

            <div class="char-counter"><span>0</span>/2000</div>
        </div>

        <div class="step-actions">
            <button type="button" class="step-button" id="prevStep3" title="Назад">
                <img src="../../images/icons/arrow-left.svg" alt="Назад">
            </button>

            <button type="button" class="step-button" id="nextStep3" title="Вперед">
                <img src="../../images/icons/arrow-right.svg" alt="Вперед">
            </button>
        </div>
    </form>

    <!-- Шаг 4: Требования и навыки -->
    <form class="vacancy-form step" data-step="4">

        <div class="form-group">
            <label for="skills">Требования и навыки</label>
            <textarea id="skills"
                      name="skills"
                      class="form-textarea"
                      maxlength="2000"
                      rows="4"
                      placeholder=""></textarea>

            <div class="char-counter"><span>0</span>/2000</div>
        </div>

        <div class="step-actions">
            <button type="button" class="step-button" id="prevStep4" title="Назад">
                <img src="../../images/icons/arrow-left.svg" alt="Назад">
            </button>

            <button type="button" class="step-button" id="nextStep4" title="Вперед">
                <img src="../../images/icons/arrow-right.svg" alt="Вперед">
            </button>
        </div>
    </form>

    <!-- Шаг 5: Что мы предлагаем -->
    <form class="vacancy-form step" data-step="5">

        <div class="form-group">
            <label for="suggestion">Что мы предлагаем</label>
            <textarea id="suggestion"
                      name="suggestion"
                      class="form-textarea"
                      maxlength="2000"
                      rows="4"
                      placeholder=""></textarea>

            <div class="char-counter"><span>0</span>/2000</div>
        </div>

        <div class="step-actions">
            <button type="button" class="step-button" id="prevStep5" title="Назад">
                <img src="../../images/icons/arrow-left.svg" alt="Назад">
            </button>

            <button type="button" class="step-button" id="nextStep5" title="Вперед">
                <img src="../../images/icons/arrow-right.svg" alt="Вперед">
            </button>
        </div>
    </form>

    <!-- Шаг 6: О компании -->
    <form class="vacancy-form step" data-step="6">

        <div class="form-group">
            <label for="aboutCompany">О компании</label>
            <textarea id="aboutCompany"
                      name="aboutCompany"
                      class="form-textarea"
                      maxlength="2000"
                      rows="3"
                      placeholder=""></textarea>

            <div class="char-counter"><span>0</span>/2000</div>
        </div>

        <div class="step-actions">
            <button type="button" class="step-button" id="prevStep6" title="Назад">
                <img src="../../images/icons/arrow-left.svg" alt="Назад">
            </button>

            <button type="button" class="step-button" id="nextStep6" title="Вперед">
                <img src="../../images/icons/arrow-right.svg" alt="Вперед">
            </button>
        </div>
    </form>

    <!-- Шаг 7: Дополнительная информация -->
    <form class="vacancy-form step" data-step="7">

        <div class="form-group">
            <label for="additionalInformation">Дополнительная информация</label>
            <textarea id="additionalInformation"
                      name="additionalInformation"
                      class="form-textarea"
                      maxlength="2000"
                      rows="3"
                      placeholder=""></textarea>

            <div class="char-counter"><span>0</span>/2000</div>
        </div>

        <div class="step-actions">
            <button type="button" class="step-button" id="prevStep7" title="Назад">
                <img src="../../images/icons/arrow-left.svg" alt="Назад">
            </button>

            <button class="step-button" id="publishBtn" title="Опубликовать">
                <img src="../../images/icons/send-publication.svg" alt="Опубликовать">
            </button>
        </div>
    </form>
</div>

<div class="confirm-overlay" id="confirmModal" style="display: none;">
    <div class="confirm-card">
        <p class="confirm-title" id="confirmMessage">Опубликовать вакансию?</p>
        <div class="confirm-buttons">
            <button type="button" class="btn-confirm-cancel" id="confirmCancel">Отмена</button>
            <button type="button" class="btn-confirm-submit" id="confirmOk">Да</button>
        </div>
    </div>
</div>

<script src="../../js/util/Helpers.js"></script>
<script src="../../js/service/ApiService.js"></script>
<script src="../../js/util/Validator.js"></script>
<script src="../../js/service/NotificationService.js"></script>
<script src="../../js/service/NavigationService.js"></script>
<script src="../../js/service/ProfileService.js"></script>
<script src="../../js/manager/VacancyPublicationManager.js"></script>
<script src="../../js/component/VacancyPublicationComponent.js"></script>
<script src="https://unpkg.com/imask"></script>
</body>
</html>
