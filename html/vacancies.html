<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакансии - HireMe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/vacancies.css">
    <link rel="stylesheet" href="../css/service/notification-system.css">
    <link rel="stylesheet" href="../css/service/icon-action.css">
    <link rel="stylesheet" href="../css/about-me/layout/header.css">
</head>
<body>
<div class="container">
    <header class="app-header">
        <div class="header-content">
            <button class="back-button size-40">
                <img src="../images/icons/arrow-back.svg" alt="Назад">
            </button>
            <h1 class="app-title">Вакансии</h1>
        </div>
    </header>

    <main class="vacancies-container">
        <!-- Список вакансий будет заполняться динамически -->
        <div class="vacancies-list" id="vacanciesList">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <div class="loading-text">Загружаем вакансии...</div>
            </div>
        </div>

        <!-- Состояние "нет вакансий" -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">📋</div>
            <div class="empty-title">Вакансий пока нет</div>
            <div class="empty-description">Будьте первым, кто создаст вакансию!</div>
            <button class="btn btn-primary" id="createFirstVacancyBtn">Создать вакансию</button>
        </div>
    </main>
</div>

<script src="../js/util/Helpers.js"></script>
<script src="../js/service/ApiService.js"></script>
<script src="../js/service/ProfileService.js"></script>
<script src="../js/service/NotificationService.js"></script>
<script src="../js/service/NavigationService.js"></script>
<script src="../js/component/VacancyCardComponent.js"></script>
<script src="../js/manager/VacanciesManager.js"></script>
</body>
</html>
