<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакансии - HireMe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="../css/global.css?v=3.5">
    <link rel="stylesheet" href="../css/vacancies.css?v=3.5">
    <link rel="stylesheet" href="../css/service/notification-system.css?v=3.5">
    <link rel="stylesheet" href="../css/service/icon-action.css?v=3.5">
    <link rel="stylesheet" href="../css/about-me/layout/header.css?v=3.5">
</head>

<body>
<header class="app-header">
    <div class="header-content">
        <button class="back-button size-40">
            <img src="../images/icons/arrow-back.svg" alt="Назад">
        </button>
        <h1 class="app-title">Вакансии</h1>
    </div>
</header>

<div class="container">
    <main class="vacancies-container">
        <!-- Список вакансий будет заполняться динамически -->
        <div class="vacancies-list" id="vacanciesList">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <div class="loading-text">Загружаем вакансии...</div>
            </div>
        </div>

        <!-- Состояние "нет вакансий" -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">📋</div>
            <div class="empty-title">Вакансий пока нет</div>
            <div class="empty-description">Будьте первым, кто создаст вакансию!</div>
            <button class="btn btn-primary" id="createFirstVacancyBtn">Создать вакансию</button>
        </div>
    </main>
</div>

<script src="../js/util/Helpers.js?v=3.5"></script>
<script src="../js/service/ApiService.js?v=3.5"></script>
<script src="../js/service/ProfileService.js?v=3.5"></script>
<script src="../js/service/NotificationService.js?v=3.5"></script>
<script src="../js/service/NavigationService.js?v=3.5"></script>
<script src="../js/component/VacancyCardComponent.js?v=3.5"></script>
<script src="../js/manager/VacanciesManager.js?v=3.5"></script>
</body>
</html>
