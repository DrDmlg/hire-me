<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главное меню | Eliquence</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="css/global.css?v=5.0.1>
    <link rel="stylesheet" href="css/index.css?v=5.0.1>
    <link rel="stylesheet" href="css/service/notification-system.css?v=5.0.1>
</head>

<body>
<div class="container">
    <div class="logo">
        <h1>Eliquence</h1>
        <p>Ваш путеводитель в сфере найма</p>
    </div>

    <div class="user-info" id="userInfo">
        <div class="avatar-container" id="userAvatar"></div>
        <div class="user-name" id="userName"></div>
    </div>

    <div class="actions-grid">
        <a href="html/registration-choice.html" class="action-card">
            <img src="images/icons/registration.svg" alt="Регистрация" class="action-icon">
            <div class="action-label">Регистрация</div>
            <div class="action-description">Заполните профиль для поиска работы или сотрудника</div>
        </a>

        <a href="#" class="action-card profile-link">
            <img src="images/icons/profile.svg" alt="Профиль" class="action-icon">
            <div class="action-label">Мой профиль</div>
            <div class="action-description">Просмотр и редактирование данных</div>
        </a>

        <a href="html/vacancies.html" class="action-card">
            <img src="images/icons/vacancy.svg" alt="Вакансии" class="action-icon">
            <div class="action-label">Вакансии</div>
            <div class="action-description">Подходящие предложения работы</div>
        </a>

        <a href="https://t.me/eliquence_bot" class="action-card">
            <img src="images/icons/support.svg" alt="Профиль" class="action-icon">
            <div class="action-label">Поддержка</div>
            <div class="action-description">Помощь и консультация в работе с сервисом</div>
        </a>
    </div>

    <div class="telegram-integration">
        <p>Работаем через Telegram</p>
        <a href="https://t.me/hm_rebot" class="btn-telegram" target="_blank">
            <img src="images/icons/telegram.svg" alt="Telegram">
            <span>Перейти в бота</span>
        </a>
    </div>
</div>

<script src="js/util/Helpers.js?v=5.0.1></script>
<script src="js/util/UserProfileFiller.js?v=5.0.1></script>
<script src="js/service/NotificationService.js?v=5.0.1></script>
<script src="js/service/NavigationService.js?v=5.0.1></script>
<script src="js/service/ApiService.js?v=5.0.1></script>
<script src="js/service/ProfileService.js?v=5.0.1></script>
<script src="js/index.js?v=5.0.1></script>
</body>
</html>
